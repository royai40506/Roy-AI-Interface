name: Build Roy AI APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: artifacts/roy-ai

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install Dependencies
        run: pnpm install

      - name: Build Web
        env:
          PORT: 3000
          BASE_PATH: /
          API_PORT: 8080
        run: pnpm build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        working-directory: artifacts/roy-ai/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Roy-AI-Debug-APK
          path: artifacts/roy-ai/android/app/build/outputs/apk/debug/app-debug.apk
